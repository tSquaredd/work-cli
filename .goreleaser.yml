version: 2

project_name: work

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/work
    binary: work
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

homebrew_casks:
  - name: work
    binaries:
      - work
    homepage: https://github.com/tSquaredd/work-cli
    description: Claude Code worktree manager — parallel AI coding sessions
    repository:
      owner: tSquaredd
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
